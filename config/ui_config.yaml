camera:
  name: rgbd_cam
  image_topic: /color_detection/image_result
  object_info_topic: /object/pixel_coords
  camera_info_topic: /rgbd_cam/color/camera_info
  service_namespace: /rgbd_cam
  exposure: 2000
  auto_exposure: true
  auto_white_balance: true

detection:
  node_name: color_detection

debug:
  enabled: false

roi:
  x_min: 220
  y_min: 140
  x_max: 420
  y_max: 340

goods:
  - name: 红方块
    label: red
  - name: 蓝方块
    label: blue

poses:
  init:
    duration_ms: 800
    joints:
      - [1, 500]
      - [2, 560]
      - [3, 130]
      - [4, 115]
      - [5, 500]
      - [10, 200]
  scan:
    duration_ms: 800
    joints:
      - [1, 500]
      - [2, 560]
      - [3, 130]
      - [4, 115]
      - [5, 500]
      - [10, 200]
  grab:
    duration_ms: 800
    joints:
      - [1, 500]
      - [2, 560]
      - [3, 130]
      - [4, 115]
      - [5, 500]
      - [10, 200]

search:
  base_servo_id: 1
  left_pos: 875
  right_pos: 125
  duration_ms: 1500
  manual_hint_only: false

gpd:
  enabled: true
  grasp_topic: /detect_grasps/clustered_grasps
  camera_frame: rgbd_cam_color_optical_frame
  target_frame: base_link
  pre_grasp_posture: 600
  grasp_posture: 400
  approach:
    x: 0.0
    y: 0.0
    z: 0.04
  retreat:
    x: 0.0
    y: 0.0
    z: 0.04
  pitch: 80.0
  align_angle: -90.0
